name: Waka Readme Stats

on:
  schedule:
    # 每天北京时间中午 12 点和半夜 12 点自动更新 (UTC 4:00, 16:00)
    - cron: '0 4,16 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-readme:
    name: Update WakaTime & Commit Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          # 必填的安全密钥
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          
          # 展示内容配置（严格匹配 valid inputs 列表）
          SHOW_OS: "True"                 # 展示操作系统比例
          SHOW_PROJECTS: "True"           # 展示项目占比
          SHOW_EDITORS: "True"            # 展示编辑器占比
          SHOW_TIMEZONE: "True"           # 展示你的时区
          SHOW_COMMIT: "True"             # 开启 Night Owl 提交时间段统计
          SHOW_DAYS_OF_WEEK: "True"       # 开启星期几最活跃统计
          SHOW_LANGUAGE_PER_REPO: "True"  # 展示仓库主语言占比
          SHOW_UPDATED_DATE: "True"       # 展示最近更新时间
          
          # 修正后的样式参数
          LOCALE: "en"                    # 使用英文版语言输出
          SYMBOL_VERSION: "1"             # 使用标准的高亮实心方块进度条
