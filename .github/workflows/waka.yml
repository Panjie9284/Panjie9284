name: Waka Readme Stats

on:
  schedule:
    # 每天凌晨 0 点和中午 12 点自动更新
    - cron: '0 4,16 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  update-readme:
    name: Update WakaTime & Commit Stats
    runs-on: ubuntu-latest
    # 显式赋予写权限，解决 Actions 无法提交更新的问题
    permissions:
      contents: write
      
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          
          # 展示内容配置
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_EDITORS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          
          # 样式
          TIME_ZONE: "Asia/Shanghai"
          SYMBOL: "⣿"
